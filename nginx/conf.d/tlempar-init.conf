# ===========================================
# Configuração TEMPORÁRIA — apenas para obter o primeiro certificado SSL.
# Após rodar o certbot, substitua este arquivo por tlempar.conf
#
# Uso:
#   cp tlempar-init.conf tlempar.conf
#   docker compose up -d nginx
#   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d tlempar.com.br -d www.tlempar.com.br --email seu@email.com --agree-tos
#   cp tlempar.conf.bak tlempar.conf  (restaurar o original com SSL)
#   docker compose restart nginx
# ===========================================
server {
    listen 80;
    server_name srv19774812.stayx.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
