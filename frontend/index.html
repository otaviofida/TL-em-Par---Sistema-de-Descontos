<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>TL em Par | Clube de Descontos</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#feb621" />
    <meta name="description" content="Clube de benefícios gastronômicos por assinatura. Compre 1 e ganhe outro!" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TL em Par" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/juz3oqu.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then(reg => {
              // Forçar check de atualização a cada visita
              reg.update();
            });
        });
      }
    </script>
  </body>
</html>
